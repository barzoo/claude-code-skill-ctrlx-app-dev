name: ctrlx-{company}-{app}
version: '1.0.0'
summary: '{app} - ctrlX Data Layer Application (.NET)'
description: |
  {description}
  Provides real-time data via ctrlX Data Layer.
base: core22
confinement: strict
grade: stable

parts:
  {app}:
    plugin: dotnet
    source: .
    dotnet-build-configuration: Release
    dotnet-self-contained-runtime-identifier: linux-x64  # or linux-arm64
    build-packages:
      - dotnet-sdk-8.0
    # NuGet feed for Bosch Datalayer package:
    # Add NuGet.Config to project root:
    # <configuration><packageSources>
    #   <add key="bosch" value="https://nexus.boschrexroth.com/repository/nuget-hosted/"/>
    # </packageSources></configuration>
    override-build: |
      dotnet restore
      dotnet publish -c Release -r linux-x64 --self-contained \
        -o $CRAFT_PART_INSTALL/bin/

apps:
  {app}:
    command: bin/ctrlx-{company}-{app}
    daemon: simple
    restart-condition: always
    plugs:
      - network
      - network-bind
      - ctrlx-datalayer

plugs:
  ctrlx-datalayer:
    interface: content
    content: ctrlx-datalayer
    target: $SNAP_DATA/.datalayer
